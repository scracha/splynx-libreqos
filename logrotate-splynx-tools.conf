# Logrotate config for remaining Splynx tool logs not covered elsewhere
# Install with: sudo cp /var/www/html/splynx-libreqos/logrotate-splynx-tools.conf /etc/logrotate.d/splynx-tools

/var/log/libreqos-poller.log
/var/log/task-exporter.log
/var/log/epmp-nms-linktest.log
{
    su www-data www-data
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0664 www-data www-data
    size 5M
}

/var/www/html/splynx-slack-poller/poller.log
/var/www/html/radio-ticket/cleanup.log
{
    su www-data www-data
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0664 www-data www-data
    size 5M
}
